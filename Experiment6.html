<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="exp6.css" >
    <title>Shopping card</title>
</head>
<body>
    <main>
        <section id="banner">ShopEasy</section>

            <div id="photo_card"><img src="leptoppic.jpg"></div>
            <div id="photo_description">

                <p id="description"> Specs: 13th Gen Intel Core i5 1334U (16GB LPDDR5 , 512GB SSD) 2K, WUXGA,Anti-Glare,300</p>
                <p id="price"><span id="offer_price"> &#8377; 78,000</span>  <span id="real_price"> &#8377; 1,19,900</span></p>
            </div>
            <div id="add_btn"><button> Add to Cart</button></div>
        </section>
    </main>
</body>
</html>
